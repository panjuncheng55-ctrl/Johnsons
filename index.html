<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潘军成 Johnsons | 个人主页</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        a {
            color: #61dafb;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #21a1f1;
        }
        .glow {
            text-shadow: 0 0 5px #61dafb;
        }
        .typing { 
            white-space: nowrap;
            overflow: hidden;
            border-right: .15em solid #61dafb; 
            width: 0;
            animation: typing 3s steps(30, end), blink-caret .75s step-end infinite;
        }
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #61dafb; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="glow">欢迎来到我的个人主页</h1>
            <div class="avatar">
                <img src="avatar.jpg" alt="Avatar" style="width: 150px; border-radius: 50%;">
            </div>
            <p>姓名: 潘军成</p>
            <p class="typing">软件工程师 | Web 开发 | 音乐爱好者</p>
            <h2>联系方式</h2>
            <ul>
                <li><a href="mailto:example@example.com">电子邮件</a></li>
                <li><a href="https://github.com/panjuncheng55-ctrl">GitHub</a></li>
            </ul>
            <h2>个人优势</h2>
            <ul>
                <li>团队合作</li>
                <li>快速学习</li>
                <li>解决问题的能力</li>
            </ul>
            <h2>工作经历</h2>
            <ul>
                <li>公司 A (2020 - 2022)</li>
                <li>公司 B (2022 - 至今)</li>
            </ul>
            <h2>技能标签</h2>
            <p>HTML, CSS, JavaScript, React, Node.js</p>
        </div>
    </div>
    <script>
        // Particle animation
        const particles = [];
        for (let i = 0; i < 100; i++) {
            particles.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 5
            });
        }
        function animateParticles() {
            requestAnimationFrame(animateParticles);
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();
                particle.x += (Math.random() - 0.5);
                particle.y += (Math.random() - 0.5);
            });
        }
        animateParticles();
    </script>
    <canvas id="particleCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></canvas>
</body>
</html>
