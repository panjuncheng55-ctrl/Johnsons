<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Theme Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #121212;
            color: #ffffff;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }
        .music-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #6200ea;
            border: none;
            padding: 10px 20px;
            color: white;
            cursor: pointer;
        }
        .typing-animation {
            font-size: 2em;
            border-right: 0.1em solid;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 3s steps(30, end), blink 0.75s step-end infinite;
        }
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }
        .tilt-card {
            width: 200px;
            height: 300px;
            background: #272727;
            perspective: 1000px;
        }
        .tilt-card-content {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }
        .tilt-card:hover .tilt-card-content {
            transform: rotateY(180deg);
        }
        .tilt-card-front, .tilt-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
        }
        .tilt-card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body>
    <h1 class="typing-animation">Welcome to My Portfolio</h1>
    <div class="tilt-card">
        <div class="tilt-card-content">
            <div class="tilt-card-front">My Work</div>
            <div class="tilt-card-back">Contact Me</div>
        </div>
    </div>
    <button class="music-button">Toggle Music</button>
    <script>
        const musicButton = document.querySelector('.music-button');
        let musicPlaying = false;
        const audio = new Audio('path/to/music.mp3');

        musicButton.addEventListener('click', () => {
            if (musicPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
            musicPlaying = !musicPlaying;
        });
        const particlesCount = 100;
        for (let i = 0; i < particlesCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 5 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * window.innerWidth + 'px';
            particle.style.top = Math.random() * window.innerHeight + 'px';
            document.body.appendChild(particle);
        }
    </script>
</body>
</html>
